version: '3.8'

services:
  server:
    build:
      context: .
      args:
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-}
    ports:
      - "${PORT:-8124}:8124"
    environment:
      - BASE_URL=${BASE_URL:-http://localhost:8124}
      - PORT=${PORT:-8124}
      - MAXGAMES=${MAXGAMES:-5}
    restart: unless-stopped
